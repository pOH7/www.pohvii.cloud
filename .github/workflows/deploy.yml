name: Deploy to Cloudflare

on:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    if: ${{ github.ref == 'refs/heads/master' }}
    name: Deploy staging
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: staging

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ENV: staging
      NEXT_PUBLIC_GISCUS_REPO: ${{ vars.NEXT_PUBLIC_GISCUS_REPO }}
      NEXT_PUBLIC_GISCUS_REPO_ID: ${{ vars.NEXT_PUBLIC_GISCUS_REPO_ID }}
      NEXT_PUBLIC_GISCUS_CATEGORY: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY }}
      NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}
      NEXT_PUBLIC_BETTER_AUTH_URL: ${{ vars.NEXT_PUBLIC_BETTER_AUTH_URL }}
      BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      AUTH_GITHUB_CLIENT_ID: ${{ vars.AUTH_GITHUB_CLIENT_ID }}
      AUTH_GITHUB_CLIENT_SECRET: ${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate staging deployment environment
        run: |
          set -euo pipefail

          required=(
            CLOUDFLARE_API_TOKEN
            CLOUDFLARE_ACCOUNT_ID
            NEXT_PUBLIC_GISCUS_REPO
            NEXT_PUBLIC_GISCUS_REPO_ID
            NEXT_PUBLIC_GISCUS_CATEGORY
            NEXT_PUBLIC_GISCUS_CATEGORY_ID
            BETTER_AUTH_URL
            BETTER_AUTH_SECRET
            AUTH_GITHUB_CLIENT_ID
            AUTH_GITHUB_CLIENT_SECRET
          )

          missing=0
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error title=Missing deployment variable::$key is not configured"
              missing=1
            fi
          done

          exit "$missing"

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Sync staging Worker runtime secrets
        run: |
          set -euo pipefail

          for key in BETTER_AUTH_URL BETTER_AUTH_SECRET AUTH_GITHUB_CLIENT_ID AUTH_GITHUB_CLIENT_SECRET; do
            printf '%s' "${!key}" | pnpm exec wrangler secret put "$key" --env staging
          done

      - name: Deploy staging Worker
        run: pnpm exec vinext deploy --env staging

  deploy-production:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_GISCUS_REPO: ${{ vars.NEXT_PUBLIC_GISCUS_REPO }}
      NEXT_PUBLIC_GISCUS_REPO_ID: ${{ vars.NEXT_PUBLIC_GISCUS_REPO_ID }}
      NEXT_PUBLIC_GISCUS_CATEGORY: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY }}
      NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}
      NEXT_PUBLIC_BETTER_AUTH_URL: ${{ vars.NEXT_PUBLIC_BETTER_AUTH_URL }}
      BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      AUTH_GITHUB_CLIENT_ID: ${{ vars.AUTH_GITHUB_CLIENT_ID }}
      AUTH_GITHUB_CLIENT_SECRET: ${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate production deployment environment
        run: |
          set -euo pipefail

          required=(
            CLOUDFLARE_API_TOKEN
            CLOUDFLARE_ACCOUNT_ID
            NEXT_PUBLIC_GISCUS_REPO
            NEXT_PUBLIC_GISCUS_REPO_ID
            NEXT_PUBLIC_GISCUS_CATEGORY
            NEXT_PUBLIC_GISCUS_CATEGORY_ID
            BETTER_AUTH_URL
            BETTER_AUTH_SECRET
            AUTH_GITHUB_CLIENT_ID
            AUTH_GITHUB_CLIENT_SECRET
          )

          missing=0
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error title=Missing deployment variable::$key is not configured"
              missing=1
            fi
          done

          exit "$missing"

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Sync production Worker runtime secrets
        run: |
          set -euo pipefail

          for key in BETTER_AUTH_URL BETTER_AUTH_SECRET AUTH_GITHUB_CLIENT_ID AUTH_GITHUB_CLIENT_SECRET; do
            printf '%s' "${!key}" | pnpm exec wrangler secret put "$key"
          done

      - name: Deploy production Worker
        run: pnpm exec vinext deploy
