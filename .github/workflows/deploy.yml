name: Deploy to Cloudflare

on:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    if: ${{ github.ref == 'refs/heads/master' }}
    name: Deploy staging
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: staging

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ENV: staging
      NEXT_PUBLIC_GISCUS_REPO: ${{ vars.NEXT_PUBLIC_GISCUS_REPO }}
      NEXT_PUBLIC_GISCUS_REPO_ID: ${{ vars.NEXT_PUBLIC_GISCUS_REPO_ID }}
      NEXT_PUBLIC_GISCUS_CATEGORY: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY }}
      NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate staging deployment environment
        run: |
          set -euo pipefail

          required=(
            CLOUDFLARE_API_TOKEN
            CLOUDFLARE_ACCOUNT_ID
            NEXT_PUBLIC_GISCUS_REPO
            NEXT_PUBLIC_GISCUS_REPO_ID
            NEXT_PUBLIC_GISCUS_CATEGORY
            NEXT_PUBLIC_GISCUS_CATEGORY_ID
          )

          missing=0
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error title=Missing deployment variable::$key is not configured"
              missing=1
            fi
          done

          exit "$missing"

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Worker tests
        run: pnpm run test:worker

      - name: Build static site
        run: pnpm run build

      - name: Prepare static deployment config
        run: pnpm run prepare:static-deploy

      - name: Deploy staging static Worker
        run: pnpm exec wrangler deploy --config wrangler.jsonc --env staging

  deploy-production:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_GISCUS_REPO: ${{ vars.NEXT_PUBLIC_GISCUS_REPO }}
      NEXT_PUBLIC_GISCUS_REPO_ID: ${{ vars.NEXT_PUBLIC_GISCUS_REPO_ID }}
      NEXT_PUBLIC_GISCUS_CATEGORY: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY }}
      NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate production deployment environment
        run: |
          set -euo pipefail

          required=(
            CLOUDFLARE_API_TOKEN
            CLOUDFLARE_ACCOUNT_ID
            NEXT_PUBLIC_GISCUS_REPO
            NEXT_PUBLIC_GISCUS_REPO_ID
            NEXT_PUBLIC_GISCUS_CATEGORY
            NEXT_PUBLIC_GISCUS_CATEGORY_ID
          )

          missing=0
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error title=Missing deployment variable::$key is not configured"
              missing=1
            fi
          done

          exit "$missing"

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Worker tests
        run: pnpm run test:worker

      - name: Build static site
        run: pnpm run build

      - name: Prepare static deployment config
        run: pnpm run prepare:static-deploy

      - name: Deploy production static Worker
        run: pnpm exec wrangler deploy --config wrangler.jsonc --env=""
